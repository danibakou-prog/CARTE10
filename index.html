<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث المباشر - متصل بالسحابة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .player-card {
            background: #1e293b;
            width: 100%;
            max-width: 1000px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }

        #videoContainer {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
        }

        #videoContainer iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #0f172a;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background-color: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ef4444;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header class="p-4 bg-slate-950 flex justify-between items-center px-8 border-b border-slate-800">
        <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="12" x="2" y="6" rx="2"/><path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.934a.5.5 0 0 0-.777-.416L16 11z"/></svg>
            <span class="font-bold text-xl">بث مباشر ذكي</span>
        </div>
        <div class="live-indicator">
            <span class="dot"></span>
            مباشر
        </div>
    </header>

    <div class="main-container">
        <div class="player-card">
            <div id="videoContainer">
                <iframe 
                    id="mainFrame"
                    src="https://testjojoo.s3.eu-north-1.amazonaws.com/bein3.html" 
                    allow="autoplay; encrypted-media; fullscreen" 
                    allowfullscreen="true">
                </iframe>
            </div>

            <div class="controls-bar">
                <div class="flex gap-3">
                    <button id="toggleFullscreen" class="btn btn-primary">
                        ملء الشاشة
                    </button>
                    <button id="refreshStream" class="btn btn-outline bg-slate-800 px-4 py-2 rounded-lg text-sm">
                        تحديث
                    </button>
                </div>
                <div id="syncStatus" class="text-slate-500 text-xs flex items-center gap-1">
                    <span id="statusIcon">●</span> <span id="statusText">جاري الاتصال بالسحابة...</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // استيراد Firebase من CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAdqSX_AawoPmYayxgtDS5IfIgD_CZpwik",
            authDomain: "give-4c3fd.firebaseapp.com",
            projectId: "give-4c3fd",
            storageBucket: "give-4c3fd.firebasestorage.app",
            messagingSenderId: "163389557246",
            appId: "1:163389557246:web:281e670062c08ba02758af",
            measurementId: "G-4RE32MMW7E"
        };

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'live-stream-app';

        // تسجيل الدخول المجهول (ضروري لاستخدام Firestore)
        let currentUser = null;
        signInAnonymously(auth).catch(err => console.error("Auth error:", err));
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('statusText').innerText = "متصل بالسحابة";
                document.getElementById('statusIcon').style.color = "#22c55e";
            }
        });

        const fullscreenBtn = document.getElementById('toggleFullscreen');
        const frame = document.getElementById('mainFrame');

        // وظيفة إرسال البيانات إلى Firebase
        async function logFullscreenAction() {
            if (!currentUser) return;
            
            try {
                // حفظ الحدث في مجموعة (public/data/clicks) حسب قواعد النظام
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fullscreen_logs'), {
                    userId: currentUser.uid,
                    timestamp: serverTimestamp(),
                    action: "clicked_fullscreen",
                    stream_url: frame.src,
                    userAgent: navigator.userAgent
                });
                console.log("تم إرسال البيانات بنجاح");
            } catch (e) {
                console.error("خطأ في إرسال البيانات:", e);
            }
        }

        // تكبير الشاشة + إرسال البيانات
        fullscreenBtn.addEventListener('click', () => {
            // أولاً: إرسال البيانات للسحابة
            logFullscreenAction();

            // ثانياً: تنفيذ تكبير الشاشة
            if (!document.fullscreenElement) {
                if (frame.requestFullscreen) {
                    frame.requestFullscreen();
                } else if (frame.webkitRequestFullscreen) {
                    frame.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // زر التحديث
        document.getElementById('refreshStream').addEventListener('click', () => {
            const src = frame.src;
            frame.src = '';
            setTimeout(() => frame.src = src, 100);
        });
    </script>
</body>
</html>
