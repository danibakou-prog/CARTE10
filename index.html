<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث المباشر - وضع ملء الشاشة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .player-card {
            background: #1e293b;
            width: 100%;
            max-width: 1000px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }

        /* حاوية الفيديو */
        #videoContainer {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
        }

        #videoContainer iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #0f172a;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background-color: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid #475569;
            color: #cbd5e1;
        }

        .btn-outline:hover {
            background-color: #334155;
            border-color: #64748b;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ef4444;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 bg-slate-950 flex justify-between items-center px-8 border-b border-slate-800">
        <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.934a.5.5 0 0 0-.777-.416L16 11z"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>
            <span class="font-bold text-xl tracking-tight">البث المباشر المتقدم</span>
        </div>
        <div class="live-indicator">
            <span class="dot"></span>
            مباشر الآن
        </div>
    </header>

    <div class="main-container">
        <div class="player-card">
            <!-- حاوية الفيديو -->
            <div id="videoContainer">
                <iframe 
                    id="mainFrame"
                    src="https://testjojoo.s3.eu-north-1.amazonaws.com/bein3.html" 
                    allow="autoplay; encrypted-media; fullscreen" 
                    allowfullscreen="true"
                    webkitallowfullscreen="true" 
                    mozallowfullscreen="true"
                    title="Live Stream">
                </iframe>
            </div>

            <!-- شريط التحكم -->
            <div class="controls-bar">
                <div class="flex gap-3">
                    <button id="toggleFullscreen" class="btn btn-primary" title="تكبير الشاشة">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 3 6 6"/><path d="m9 21-6-6"/><path d="M21 3v6h-6"/><path d="M3 21v-6h6"/></svg>
                        ملء الشاشة
                    </button>
                    <button id="refreshStream" class="btn btn-outline" title="تحديث">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
                        تحديث القناة
                    </button>
                </div>
                <div class="hidden sm:block text-slate-400 text-sm">
                    beIN Sports 3 HD
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="p-4 bg-slate-950 text-center text-slate-500 text-xs">
        &copy; 2026 جميع الحقوق محفوظة - منصة البث الرقمي
    </footer>

    <script>
        const fullscreenBtn = document.getElementById('toggleFullscreen');
        const refreshBtn = document.getElementById('refreshStream');
        const frame = document.getElementById('mainFrame');

        // وظيفة تكبير الشاشة المحدثة لتفادي أخطاء السياسة
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                // نطلب ملء الشاشة للإطار مباشرة مع التأكد من وجود الأذونات
                try {
                    if (frame.requestFullscreen) {
                        frame.requestFullscreen();
                    } else if (frame.webkitRequestFullscreen) { /* Safari */
                        frame.webkitRequestFullscreen();
                    } else if (frame.msRequestFullscreen) { /* IE11 */
                        frame.msRequestFullscreen();
                    }
                } catch (err) {
                    console.error("تعذر تفعيل ملء الشاشة:", err);
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // تحديث البث
        refreshBtn.addEventListener('click', () => {
            const currentSrc = frame.src;
            frame.src = '';
            setTimeout(() => {
                frame.src = currentSrc;
            }, 100);
        });

        // مراقبة تغيير حالة الشاشة لتحديث شكل الزر
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h6v6"/><path d="m10 14-6 6"/><path d="M20 10h-6V4"/><path d="m14 10 6-6"/></svg>
                    تصغير الشاشة
                `;
            } else {
                fullscreenBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 3 6 6"/><path d="m9 21-6-6"/><path d="M21 3v6h-6"/><path d="M3 21v-6h6"/></svg>
                    ملء الشاشة
                `;
            }
        });
    </script>
</body>
</html>
