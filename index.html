<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث المباشر - متصل بالسحابة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .player-card {
            background: #1e293b;
            width: 100%;
            max-width: 1000px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }

        #videoContainer {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
        }

        #videoContainer iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #0f172a;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background-color: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: #334155;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <header class="p-4 bg-slate-950 flex justify-between items-center px-8 border-b border-slate-800">
        <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="12" x="2" y="6" rx="2"/><path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.934a.5.5 0 0 0-.777-.416L16 11z"/></svg>
            <span class="font-bold text-xl">بث مباشر ذكي</span>
        </div>
        <div id="connectionBadge" class="status-badge">جاري الاتصال...</div>
    </header>

    <div class="main-container">
        <div class="player-card">
            <div id="videoContainer">
                <iframe 
                    id="mainFrame"
                    src="https://testjojoo.s3.eu-north-1.amazonaws.com/bein3.html" 
                    allow="autoplay; encrypted-media; fullscreen" 
                    allowfullscreen="true">
                </iframe>
            </div>

            <div class="controls-bar">
                <div class="flex gap-3">
                    <button id="toggleFullscreen" class="btn btn-primary">
                        ملء الشاشة
                    </button>
                    <button id="refreshStream" class="btn btn-outline bg-slate-800 px-4 py-2 rounded-lg text-sm text-white">
                        تحديث
                    </button>
                </div>
                <div class="text-slate-500 text-xs" id="logStatus">
                    سجل الأحداث: جاهز
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAdqSX_AawoPmYayxgtDS5IfIgD_CZpwik",
            authDomain: "give-4c3fd.firebaseapp.com",
            projectId: "give-4c3fd",
            storageBucket: "give-4c3fd.firebasestorage.app",
            messagingSenderId: "163389557246",
            appId: "1:163389557246:web:281e670062c08ba02758af",
            measurementId: "G-4RE32MMW7E"
        };

        // تهيئة النظام
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // الحصول على App ID أو استخدام افتراضي
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'live-stream-logger';

        let user = null;

        // تسجيل الدخول المجهول إلزامي قبل أي عملية Firestore
        const initAuth = async () => {
            try {
                const result = await signInAnonymously(auth);
                user = result.user;
                document.getElementById('connectionBadge').innerText = "متصل بالسحابة";
                document.getElementById('connectionBadge').style.backgroundColor = "#166534";
                document.getElementById('connectionBadge').style.color = "#bbf7d0";
            } catch (error) {
                console.error("Auth Error:", error);
                document.getElementById('connectionBadge').innerText = "خطأ في الاتصال";
            }
        };

        initAuth();

        const fullscreenBtn = document.getElementById('toggleFullscreen');
        const frame = document.getElementById('mainFrame');
        const logStatus = document.getElementById('logStatus');

        // وظيفة إرسال البيانات (تتبع القواعد الصارمة للمسارات)
        async function sendLogToFirebase() {
            if (!user) {
                console.log("لم يتم تسجيل الدخول بعد");
                return;
            }

            try {
                // القاعدة 1: المسار يجب أن يبدأ بـ /artifacts/{appId}/public/data/
                const collectionPath = collection(db, 'artifacts', appId, 'public', 'data', 'fullscreen_clicks');
                
                await addDoc(collectionPath, {
                    timestamp: serverTimestamp(),
                    userId: user.uid,
                    action: "fullscreen_opened",
                    url: frame.src,
                    screenResolution: `${window.innerWidth}x${window.innerHeight}`
                });
                
                logStatus.innerText = "تم تسجيل الحدث بنجاح";
                logStatus.style.color = "#4ade80";
                setTimeout(() => {
                    logStatus.innerText = "سجل الأحداث: جاهز";
                    logStatus.style.color = "";
                }, 3000);
            } catch (err) {
                console.error("Firebase Error:", err);
                logStatus.innerText = "فشل في تسجيل الحدث";
                logStatus.style.color = "#f87171";
            }
        }

        // التعامل مع الزر
        fullscreenBtn.addEventListener('click', () => {
            // إرسال البيانات فوراً
            sendLogToFirebase();

            // تنفيذ ملء الشاشة
            if (!document.fullscreenElement) {
                if (frame.requestFullscreen) {
                    frame.requestFullscreen();
                } else if (frame.webkitRequestFullscreen) {
                    frame.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // زر التحديث
        document.getElementById('refreshStream').addEventListener('click', () => {
            const src = frame.src;
            frame.src = '';
            setTimeout(() => frame.src = src, 100);
        });
    </script>
</body>
</html>
